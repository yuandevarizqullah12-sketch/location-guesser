<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Guesser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }
        .header {
            background: linear-gradient(120deg, #4a90e2, #9b59b6);
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }
        .header p {
            opacity: 0.9;
        }
        .form-card {
            padding: 2rem;
            background: white;
        }
        .upload-area {
            border: 2px dashed #cbd5e0;
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover {
            border-color: #9b59b6;
            background: #faf5ff;
        }
        .upload-area img {
            max-width: 100%;
            max-height: 200px;
            margin-top: 1rem;
            border-radius: 0.5rem;
        }
        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            margin: 0.5rem 0 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #9b59b6;
            box-shadow: 0 0 0 3px rgba(155,89,182,0.2);
        }
        button {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 2rem;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px #764ba2;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 1rem;
            font-weight: 500;
            color: #4a90e2;
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            border-left-color: #9b59b6;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
            margin: 0 auto 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .results {
            padding: 0 2rem 2rem;
        }
        .card {
            background: white;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border-left: 5px solid #9b59b6;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.4s forwards;
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            background: linear-gradient(135deg, #fff, #f9f0ff);
        }
        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
            color: #2d3748;
        }
        .card .location {
            color: #718096;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }
        .card .score {
            font-weight: bold;
            color: #9b59b6;
            background: #f3e8ff;
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.75rem;
        }
        .card .source {
            font-size: 0.7rem;
            color: #a0aec0;
            margin-top: 0.5rem;
        }
        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin: 1rem 2rem;
            text-align: center;
        }
        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.75rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌍 GeoGuessr AI</h1>
        <p>Upload a photo, add a clue, and let our multi‑module system find the location</p>
    </div>
    <div class="form-card">
        <div class="upload-area" id="uploadArea">
            <p>📸 Click to select an image</p>
            <input type="file" id="imageInput" accept="image/jpeg,image/png" style="display:none">
            <img id="preview" style="display:none" alt="Preview">
        </div>
        <input type="text" id="clueInput" placeholder="Optional clue (e.g., Eiffel Tower, Paris)">
        <button id="submitBtn">🔍 Guess Location</button>
    </div>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        Analyzing image & clues...
    </div>
    <div id="resultsArea" class="results"></div>
    <footer>Powered by Google Places, OSM, OpenCV, and AI</footer>
</div>

<script>
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const clueInput = document.getElementById('clueInput');
    const submitBtn = document.getElementById('submitBtn');
    const loadingDiv = document.getElementById('loading');
    const resultsArea = document.getElementById('resultsArea');

    let selectedFile = null;

    uploadArea.addEventListener('click', () => imageInput.click());
    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (ev) => {
                preview.src = ev.target.result;
                preview.style.display = 'block';
                uploadArea.style.borderColor = '#9b59b6';
            };
            reader.readAsDataURL(file);
        }
    });

    submitBtn.addEventListener('click', async () => {
        if (!selectedFile) {
            alert('Please select an image first.');
            return;
        }

        const formData = new FormData();
        formData.append('image', selectedFile);
        if (clueInput.value.trim()) {
            formData.append('clue', clueInput.value.trim());
        }

        loadingDiv.style.display = 'block';
        resultsArea.innerHTML = '';

        try {
            const response = await fetch('/guess', {
                method: 'POST',
                body: formData
            });
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.detail || 'Server error');
            }
            const data = await response.json();
            renderTop5(data.top_5);
        } catch (error) {
            resultsArea.innerHTML = `<div class="error">❌ ${error.message}</div>`;
        } finally {
            loadingDiv.style.display = 'none';
        }
    });

    function renderTop5(predictions) {
        if (!predictions || predictions.length === 0) {
            resultsArea.innerHTML = '<div class="error">No locations found. Try another image or clue.</div>';
            return;
        }
        let html = '';
        predictions.forEach((place, idx) => {
            html += `
                <div class="card" style="animation-delay: ${idx * 0.1}s">
                    <h3>${escapeHtml(place.name)}</h3>
                    <div class="location">📍 ${place.lat.toFixed(4)}, ${place.lng.toFixed(4)}</div>
                    <div><span class="score">🏆 Score: ${place.score}</span></div>
                    <div class="source">Source: ${place.source} • ${place.types.slice(0,2).join(', ')}</div>
                </div>
            `;
        });
        resultsArea.innerHTML = html;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
